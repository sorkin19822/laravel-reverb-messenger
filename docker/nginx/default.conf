server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;
    server_tokens off;

    # Security headers — 'always' ensures headers are sent on error responses too
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "DENY"                             always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy:
    #   - scripts only from self + Pusher CDN (replace with 'self' once Vite bundle is used)
    #   - WebSocket connections to Reverb on port 8081
    #   - styles allow inline (Blade inline styles in views)
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.pusher.com; connect-src 'self' ws://localhost:8081 wss://localhost:8081; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none';" always;

    # Uncomment once TLS is terminated at this server:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
