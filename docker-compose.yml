services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: messenger_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - messenger

  nginx:
    image: nginx:alpine
    container_name: messenger_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - messenger

  mysql:
    image: mysql:8.0
    container_name: messenger_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: messenger
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: messenger
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "messenger", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messenger

  redis:
    image: redis:alpine
    container_name: messenger_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - messenger

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: messenger_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www
    ports:
      - "8081:8080"
    depends_on:
      - redis
      - app
    networks:
      - messenger

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: messenger_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    depends_on:
      - redis
      - app
    networks:
      - messenger

volumes:
  mysql_data:

networks:
  messenger:
    driver: bridge
